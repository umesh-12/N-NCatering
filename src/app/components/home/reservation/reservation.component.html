<section class="reservation-section p-tb-60 m-t-60">

  <div class="container">

    <!-- HEADER -->
    <div class="section-header m-b-40" data-aos="fade-down" data-aos-duration="900">

      <div class="text-center m-b-16">
        <div class="menu-title">
          <span>Fill Form Here</span>
        </div>
      </div>

      <h2 class="text-center mb-0">
        Reservation Form
      </h2>
    </div>

    <div class="reservation-wrapper">

      <!-- IMAGE -->
      <div class="reservation-image" data-aos="fade-right" data-aos-duration="900" data-aos-delay="100">
        <img src="../../../../assets/img/reserve.jpg" alt="">
      </div>

      <!-- FORM -->
      <form class="reservation-form">

        <input type="text" placeholder="Enter Your Name" data-aos="fade-left" data-aos-delay="100"
          data-aos-duration="700">

        <input type="email" placeholder="Enter Your Email" data-aos="fade-left" data-aos-delay="150"
          data-aos-duration="700">

        <input type="text" placeholder="Enter Your Phone Number" data-aos="fade-left" data-aos-delay="200"
          data-aos-duration="700">

        <input type="date" data-aos="fade-left" data-aos-delay="250" data-aos-duration="700">

        <input type="number" placeholder="Number Of Guest" data-aos="fade-left" data-aos-delay="300"
          data-aos-duration="700">

        <!-- RADIO 1 -->
        <div class="radio-group" data-aos="fade-left" data-aos-delay="350" data-aos-duration="700">
          <div class="radio-type">
            Function Type
          </div>
          <div class="radio-type">
            <label class="d-flex gap-2 align-items-center">
              <input type="radio" name="type">
              <span>Party</span>
            </label>

            <label class="d-flex gap-2 align-items-center">
              <input type="radio" name="type">
              <span>Wedding</span>
            </label>

            <label class="d-flex gap-2 align-items-center">
              <input type="radio" name="type">
              <span>Conference</span>
            </label>
          </div>
        </div>

        <!-- RADIO 2 -->
        <div class="radio-group" data-aos="fade-left" data-aos-delay="400" data-aos-duration="700">
          <div class="radio-type">
            Time
          </div>
          <div class="radio-type">
            <label class="d-flex gap-2 align-items-center">
              <input type="radio" name="time">
              <span>Day</span>
            </label>

            <label class="d-flex gap-2 align-items-center">
              <input type="radio" name="time">
              <span>Evening</span>
            </label>
          </div>
        </div>

        <!-- BUTTON -->
        <button type="submit" data-aos="zoom-in" data-aos-delay="450" data-aos-duration="700">
          Send Message
        </button>

      </form>

    </div>

  </div>

</section>
